name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate build environment
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          VITE_MEDIA_CLOUD_API_KEY: ${{ secrets.MEDIA_CLOUD_API_KEY }}
          VITE_MEDIA_CLOUD_COLLECTION_IDS: ${{ secrets.MEDIA_CLOUD_COLLECTION_IDS }}
        run: |
          test -n "$VITE_FIREBASE_API_KEY" || { echo "::error::Missing FIREBASE_API_KEY GitHub secret."; exit 1; }
          test -n "$VITE_YOUTUBE_API_KEY" || echo "::warning::Missing YOUTUBE_API_KEY GitHub secret. Admin YouTube refresh will be unavailable on the deployed site."
          test -n "$VITE_MEDIA_CLOUD_API_KEY" || echo "::warning::Missing MEDIA_CLOUD_API_KEY GitHub secret. Admin Media Cloud refresh will be unavailable on the deployed site."

      - name: Build site
        working-directory: frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          VITE_MEDIA_CLOUD_API_KEY: ${{ secrets.MEDIA_CLOUD_API_KEY }}
          VITE_MEDIA_CLOUD_COLLECTION_IDS: ${{ secrets.MEDIA_CLOUD_COLLECTION_IDS }}

      - name: Add SPA fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
