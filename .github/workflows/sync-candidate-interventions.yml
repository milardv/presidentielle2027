name: Sync Candidate Interventions

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */23 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync GDELT, YouTube and Media Cloud data
        run: npm run sync:interventions
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          MEDIA_CLOUD_API_KEY: ${{ secrets.MEDIA_CLOUD_API_KEY }}
          MEDIA_CLOUD_COLLECTION_IDS: ${{ secrets.MEDIA_CLOUD_COLLECTION_IDS }}
